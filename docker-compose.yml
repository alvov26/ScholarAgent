services:
  postgres:
    image: postgres:16-alpine
    container_name: scholaragent-db
    environment:
      POSTGRES_USER: scholaragent
      POSTGRES_PASSWORD: scholaragent
      POSTGRES_DB: scholaragent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholaragent"]
      interval: 10s
      timeout: 5s
      retries: 5

  latexml:
    image: latexml/ar5ivist
    entrypoint: ["true"]  # exits immediately; service exists only to pre-pull the image
    restart: "no"

  backend:
    image: mcseem1337/scholaragent-backend:latest
    container_name: scholaragent-backend
    environment:
      DATABASE_URL: postgresql://scholaragent:scholaragent@postgres:5432/scholaragent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      KG_MAX_SECTIONS: ${KG_MAX_SECTIONS:-0}
      SCHOLAR_DEBUG: ${SCHOLAR_DEBUG:-false}
      LATEXML_WORK_DIR: /app/latexml_work
      LATEXML_VOLUME_NAME: scholaragent_latexml_workdir
    volumes:
      - ./storage:/app/storage
      - latexml_workdir:/app/latexml_work
      - /var/run/docker.sock:/var/run/docker.sock  # For LaTeXML container access
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: mcseem1337/scholaragent-frontend:latest
    container_name: scholaragent-frontend
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  latexml_workdir:
    name: scholaragent_latexml_workdir  # fixed name regardless of project directory
