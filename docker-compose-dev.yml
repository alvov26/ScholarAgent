services:
  postgres:
    image: postgres:16-alpine
    container_name: scholaragent-db
    environment:
      POSTGRES_USER: scholaragent
      POSTGRES_PASSWORD: scholaragent
      POSTGRES_DB: scholaragent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholaragent"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: scholaragent-backend
    environment:
      DATABASE_URL: postgresql://scholaragent:scholaragent@postgres:5432/scholaragent
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-}
      KG_MAX_SECTIONS: ${KG_MAX_SECTIONS:-0}
      KG_DEBUG: ${KG_DEBUG:-}
      HTML_INJECTION_MODEL: ${HTML_INJECTION_MODEL:-}
      HTML_INJECTION_DEBUG: ${HTML_INJECTION_DEBUG:-false}
      TOOLTIP_AGENT_DEBUG: ${TOOLTIP_AGENT_DEBUG:-false}
    volumes:
      - ./storage:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock  # For LaTeXML container access
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: scholaragent-frontend
    environment:
      BACKEND_URL: http://backend:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
